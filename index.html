<!DOCTYPE html>
<html>
<head>
    <title>Disease Prediction System</title>

    <style>
        body {
            background: linear-gradient(to right, hsl(207, 75%, 69%), #acb6e5);
        }
        </style>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #74ebd5, #acb6e5);
            text-align: center;
            padding: 30px;
        }

        .container {
            background: white;
            width: 400px;
            margin: auto;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0px 0px 15px gray;
        }

        h2 {
            color: #333;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid rgb(204, 204, 204);
        }

        button {
            width: 95%;
            padding: 10px;
            background: hsl(250, 68%, 35%);
            color: hsl(0, 0%, 100%);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: hwb(329 13% 47%);
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            color: hsl(0, 0%, 13%);
        }

        .title {
            font-size: 22px;
            margin-bottom: 15px;
            color: #444;
        }
    </style>

</head>

<body>

<div class="container">

    <div class="title">❤️ DISEASE PREDICTION SYSTEM</div>

    <form action="/predict" method="post">

        <input type="text" name="age" placeholder="Age" required><br>

        <input type="text" name="bp" placeholder="Blood Pressure" required><br>

        <input type="text" name="chol" placeholder="Cholesterol Level" required><br>

        <input type="text" name="sugar" placeholder="Fasting Blood Sugar" required><br>

        <button type="submit">Predict</button>

    </form>
    <h3>📊 Model Accuracy: {{ accuracy }}</h3>

    <div class="result">
        {{ prediction_text }}
    </div>

</div>

</body>
</html>
